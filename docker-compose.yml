version: '3.8'

services:

  # Наше ASP.NET Core приложение
  api:
    build: ./ProductionSystem
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=4ekane;Username=postgres;Password=12122
    depends_on:
      - db
      - redis

  # База данных PostgreSQL
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: productiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis — кэш
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Nginx — обратный прокси (перенаправляет запросы к API)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  # Prometheus — собирает метрики
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana — красивые графики с метриками
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata: