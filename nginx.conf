events {}

http {
    server {
        # Nginx слушает на порту 80
        listen 80;

        # Все запросы перенаправляет к нашему API
        location / {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}